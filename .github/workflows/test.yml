# Workflow name - Displayed on the GitHub Actions tab
name: Database Migration (Goose)

on:
  push:
    # Automatically triggers when new code is pushed to the main branch
    branches: [ main ]
    # Only runs the workflow when there are changes in the migrations directory or this workflow file itself
    paths:
      - 'migrations/**'
      - '.github/workflows/test.yml'
  # Allows manual workflow triggering from the GitHub interface (Run workflow button)
  workflow_dispatch:

# Configuration to avoid running multiple migration jobs simultaneously on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # If there's a new push, cancel the previous ongoing run

jobs:
  check-connection:
    name: Run Migrations via Tailscale
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Prevents the job from hanging too long in case of network connection issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Tailscale VPN so the GitHub Runner can access the database in the internal network
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # Set up Go environment to use the Goose tool
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Specifies a specific Go version
          cache: true        # Caches dependencies to speed up subsequent runs

      # Install Goose CLI directly from source
      - name: Install Goose tool
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.19.1

      # Perform connection check and run migration files
      - name: Run Database Migration
        env:
          # Environment variables for Goose configuration (retrieved from GitHub Secrets)
          GOOSE_DBSTRING: ${{ secrets.DB_STRING }}
          GOOSE_DRIVER: postgres
        run: |
          # 1. Check network connection to the Database Server IP
          ping -c 3 100.111.220.6
          
          # 2. Check the status of current migrations
          goose -dir migrations status
          
          # 3. Execute database upgrade to the latest version
          goose -dir migrations up
