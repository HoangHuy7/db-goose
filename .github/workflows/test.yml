name: Quick Test Connection

on: [push] # Cứ push là chạy

jobs:
  check-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}


      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Ping and Migrate
        env:
          # Chuỗi kết nối Postgres của bạn
          GOOSE_DBSTRING: ${{ secrets.DB_STRING }}
          GOOSE_DRIVER: postgres
        run: |
          # 1. Test ping
          ping -c 3 100.111.220.6
          
          # 2. Test Goose status (xem danh sách migration)
          goose -dir migrations status
          
          # 3. Chạy migrate thật
          goose -dir migrations up